<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Document Repository System</title>
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
<script>
  if (typeof msal === 'undefined') {
    document.write('<script src="https://alcdn.msftauth.net/browser/2.38.2/js/msal-browser.min.js"><\/script>');
  }
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f7cff;
    --accent2: #7b5cfa;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --hr: #1e2240;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #0f1117 0%, #1a1d27 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(12px);
  }
  .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 40px; height: 40px; border-radius: 8px; background: rgba(255,255,255,.92);
    display: flex; align-items: center; justify-content: center; padding: 5px; flex-shrink: 0;
  }
  .logo-icon img { width: 100%; height: 100%; object-fit: contain; }
  .logo-text h1 { font-size: 16px; font-weight: 700; letter-spacing: -.3px; color: var(--text); }
  .logo-text p { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all .15s; font-family: 'Inter', sans-serif; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6b92ff; }
  .btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--accent); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--red); border: 1px solid rgba(239,68,68,.3); }
  .btn-danger:hover { background: rgba(239,68,68,.25); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  .user-pill { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px 5px 6px; font-size: 12px; color: var(--text2); }
  .user-avatar { width: 22px; height: 22px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #fff; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  .sync-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  .tabs-wrapper { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; overflow-x: auto; }
  .tabs { max-width: 1400px; margin: 0 auto; display: flex; gap: 0; }
  .tab { padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; user-select: none; }
  .tab:hover { color: var(--text2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-count { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; border-radius: 4px; background: var(--surface2); font-size: 10px; font-weight: 600; margin-left: 6px; color: var(--text3); padding: 0 4px; }
  .tab.active .tab-count { background: rgba(79,124,255,.2); color: var(--accent); }

  .main { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .search-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; flex: 1; min-width: 200px; }
  .search-box input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; font-family: 'Inter', sans-serif; }
  .search-box input::placeholder { color: var(--text3); }
  .search-icon { color: var(--text3); font-size: 14px; }
  .filter-group { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .filter-select { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; outline: none; }
  .filter-select:hover { border-color: var(--accent); }

  .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; display: flex; align-items: center; gap: 10px; }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-dot.green { background: var(--green); }
  .stat-dot.yellow { background: var(--yellow); }
  .stat-dot.red { background: var(--red); }
  .stat-dot.blue { background: var(--accent); }
  .stat-num { font-size: 18px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 1px; }

  .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--surface2); }
  th { padding: 12px 14px; text-align: left; font-size: 11px; font-weight: 600; letter-spacing: .5px; color: var(--text3); text-transform: uppercase; white-space: nowrap; border-bottom: 1px solid var(--border); }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { color: var(--text2); }
  th .sort-icon { margin-left: 4px; opacity: .4; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent); }

  tbody tr { border-bottom: 1px solid var(--hr); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(79,124,255,.04); }
  tbody tr.editing { background: rgba(79,124,255,.08) !important; }

  td { padding: 11px 14px; font-size: 13px; color: var(--text2); vertical-align: middle; }
  td.doc-name { color: var(--text); font-weight: 500; font-size: 13px; }
  td.desc { color: var(--text3); font-size: 12px; max-width: 280px; }

  .cell-edit { background: var(--surface2); border: 1px solid var(--accent); border-radius: 5px; padding: 5px 8px; font-size: 13px; color: var(--text); width: 100%; font-family: 'Inter', sans-serif; outline: none; resize: none; }
  .cell-edit:focus { border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(79,124,255,.2); }

  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; white-space: nowrap; }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; }
  .badge.active { background: rgba(34,197,94,.15); color: #4ade80; }
  .badge.active .badge-dot { background: var(--green); }
  .badge.pending { background: rgba(245,158,11,.15); color: #fbbf24; }
  .badge.pending .badge-dot { background: var(--yellow); }
  .badge.archived { background: rgba(100,116,139,.15); color: #94a3b8; }
  .badge.archived .badge-dot { background: var(--text3); }

  .chip { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; border: 1px solid; }
  .chip-0 { background: rgba(79,124,255,.12); color: #93b4ff; border-color: rgba(79,124,255,.3); }
  .chip-1 { background: rgba(123,92,250,.12); color: #b197fc; border-color: rgba(123,92,250,.3); }
  .chip-2 { background: rgba(20,184,166,.12); color: #5eead4; border-color: rgba(20,184,166,.3); }
  .chip-3 { background: rgba(251,146,60,.12); color: #fb923c; border-color: rgba(251,146,60,.3); }
  .chip-4 { background: rgba(236,72,153,.12); color: #f472b6; border-color: rgba(236,72,153,.3); }

  .link-cell a { color: var(--accent); font-size: 12px; text-decoration: none; }
  .link-cell a:hover { text-decoration: underline; }
  .link-placeholder { color: var(--text3); font-size: 12px; font-style: italic; }

  .row-actions { display: flex; gap: 6px; opacity: 0; transition: opacity .15s; white-space: nowrap; }
  tbody tr:hover .row-actions { opacity: 1; }
  .row-actions.always-show { opacity: 1; }

  .add-row-btn { display: flex; align-items: center; gap: 8px; padding: 14px 18px; color: var(--text3); font-size: 13px; cursor: pointer; transition: all .15s; border-top: 1px solid var(--border); background: none; width: 100%; text-align: left; }
  .add-row-btn:hover { color: var(--accent); background: rgba(79,124,255,.05); }
  .add-icon { font-size: 16px; }

  .empty { text-align: center; padding: 48px; color: var(--text3); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  .modal-bg { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.6); backdrop-filter: blur(4px); align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: min(520px, 90vw); max-height: 90vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--text); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 12px; color: var(--text3); margin-bottom: 6px; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; font-family: 'Inter', sans-serif; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

  .toast { position: fixed; bottom: 24px; right: 24px; z-index: 300; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 18px; font-size: 13px; color: var(--text2); transform: translateY(60px); opacity: 0; transition: all .3s; pointer-events: none; max-width: 360px; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(34,197,94,.4); color: #4ade80; }
  .toast.error { border-color: rgba(239,68,68,.4); color: #f87171; }

  .center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: min(420px, 92vw); text-align: center; }
  .login-card .logo-icon { width: 64px; height: 64px; font-size: 24px; margin: 0 auto 18px; padding: 8px; }
  .login-card h2 { font-size: 18px; margin-bottom: 8px; }
  .login-card p { font-size: 13px; color: var(--text3); line-height: 1.6; margin-bottom: 24px; }
  .login-card .btn { width: 100%; padding: 12px; font-size: 14px; }
  .spinner { width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.35); border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #f87171; text-align: left; margin-top: 16px; white-space: pre-wrap; word-break: break-word; }

  .welcome-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px; max-width: 900px; }
  .welcome-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 8px; }
  .welcome-card h2 { font-size: 22px; font-weight: 700; }
  .welcome-body { color: var(--text2); font-size: 14px; line-height: 1.8; margin-top: 16px; }
  .welcome-edit-area { width: 100%; min-height: 220px; background: var(--surface2); border: 1px solid var(--accent); border-radius: 0 0 8px 8px; padding: 14px; color: var(--text); font-size: 14px; font-family: 'Inter', sans-serif; line-height: 1.7; outline: none; overflow-y: auto; }
  .quick-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 24px; }

  .rte-toolbar { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--accent); border-bottom: none; border-radius: 8px 8px 0 0; padding: 8px 10px; margin-top: 16px; }
  .rte-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 5px 10px; font-size: 12px; cursor: pointer; }
  .rte-btn:hover { color: var(--text); border-color: var(--accent); }
  .rte-select { background: var(--surface); border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 5px 8px; font-size: 12px; font-family: 'Inter', sans-serif; cursor: pointer; }
  .rte-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }

  .overview-list { margin-top: 18px; border-top: 1px solid var(--border); }
  .overview-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 4px; border-bottom: 1px solid var(--hr); font-size: 13px; }
  .overview-team { color: var(--text2); }
  .overview-count { color: var(--text); font-weight: 600; font-family: 'JetBrains Mono', monospace; }

  @media (max-width: 768px) {
    .header { padding: 16px 16px; }
    .main { padding: 16px 16px; }
    .tabs-wrapper { padding: 0 16px; }
    .form-row { grid-template-columns: 1fr; }
    .header-actions .btn span { display: none; }
  }
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════════════════
const CONFIG = {
  clientId: "0b2bac3c-b1fb-4b99-bd0e-4dbb18875505",
  tenantId: "00efd395-d024-40e7-be0f-842f884fd0dd",
  redirectUri: window.location.origin + window.location.pathname,
  hostname: "elitegslph.sharepoint.com",
  sitePath: "/sites/ELITEGLOBALMANCOMM",
  listDisplayName: "Document Repository System",
  guideListDisplayName: "Document Repository Guide",
  groupFieldCandidates: ["Team"],
  teamOrder: ["HR & Admin", "Finance", "IT", "QA", "John's Cluster", "Gary's Cluster", "Archives", "General"],
  preferredColumnOrder: ["Category", "Sub-Category", "Title", "Description", "Owner", "Link", "Update Cycle", "Status", "Last Updated"],
  // Fallback: some SharePoint/Graph responses omit the hyperlinkOrPicture facet even for real Hyperlink columns.
  // Any column whose display name matches one of these is always treated as a hyperlink field.
  hyperlinkColumnNames: ["Link"]
};
const GRAPH_SCOPES = ["Sites.ReadWrite.All", "Files.ReadWrite.All", "User.Read"];
const GRAPH_ROOT = "https://graph.microsoft.com/v1.0";
const DEFAULT_GUIDE = "Welcome to the Document Repository System.<br><br>This is where our team keeps track of key documents, reports, and references across departments. Use the tabs above to browse each team's documents, and click \"Edit Guide\" to update this guideline.";

// ═══════════════════════════════════════════════════════════════════════════
// MSAL AUTH
// ═══════════════════════════════════════════════════════════════════════════
let msalInstance = null;
function ensureMsal() {
  if (typeof msal === "undefined") {
    showAuthError("Failed to load the sign-in library (MSAL).\nYour network/firewall may be blocking alcdn.msauth.net and alcdn.msftauth.net. Please ask IT to allow these domains, or refresh the page to try again.");
    return false;
  }
  if (!msalInstance) {
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: CONFIG.clientId,
        authority: `https://login.microsoftonline.com/${CONFIG.tenantId}`,
        redirectUri: CONFIG.redirectUri
      },
      cache: { cacheLocation: "localStorage", storeAuthStateInCookie: false }
    });
  }
  return true;
}

let currentAccount = null;

async function initAuth() {
  if (!ensureMsal()) return;
  await msalInstance.initialize();
  const redirectResult = await msalInstance.handleRedirectPromise().catch(err => {
    showAuthError("Sign-in error: " + err.message);
    return null;
  });
  const accounts = msalInstance.getAllAccounts();
  if (redirectResult && redirectResult.account) {
    currentAccount = redirectResult.account;
  } else if (accounts.length > 0) {
    currentAccount = accounts[0];
  }
  if (currentAccount) {
    msalInstance.setActiveAccount(currentAccount);
    startApp();
  }
}

function login() {
  if (!ensureMsal()) return;
  msalInstance.loginRedirect({ scopes: GRAPH_SCOPES });
}

function logout() {
  msalInstance.logoutRedirect({ account: currentAccount });
}

async function getToken() {
  const account = msalInstance.getActiveAccount();
  if (!account) throw new Error("Please sign in.");
  try {
    const res = await msalInstance.acquireTokenSilent({ scopes: GRAPH_SCOPES, account });
    return res.accessToken;
  } catch (e) {
    await msalInstance.acquireTokenRedirect({ scopes: GRAPH_SCOPES, account });
    throw e;
  }
}

async function graphFetch(pathOrUrl, options = {}) {
  const token = await getToken();
  const url = pathOrUrl.startsWith("http") ? pathOrUrl : GRAPH_ROOT + pathOrUrl;
  const res = await fetch(url, {
    ...options,
    headers: { "Authorization": `Bearer ${token}`, "Content-Type": "application/json", ...(options.headers || {}) }
  });
  if (!res.ok) {
    let detail = "";
    try { detail = JSON.stringify(await res.json()); } catch (e) {}
    throw new Error(`Graph API ${res.status}: ${detail}`);
  }
  if (res.status === 204) return null;
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

function showAuthError(msg) {
  document.getElementById("authError").innerHTML = `<div class="error-box">${escapeHtml(msg)}</div>`;
}

// ═══════════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════════
let siteId = null;
let listId = null;
let guideListId = null;
let guideItemId = null;
let guideContent = DEFAULT_GUIDE;
let guideEditing = false;
let columns = [];
let groupField = null;
let teamChoices = []; // actual Team choice values as defined in SharePoint (avoids typo/format mismatches)
let allItems = [];
let activeTab = "Welcome";
let searchQ = "";
let filterStatus = "";
let filterCategory = "";
let sortCol = -1, sortAsc = true;
let editingItemId = null;

// ═══════════════════════════════════════════════════════════════════════════
// BOOTSTRAP
// ═══════════════════════════════════════════════════════════════════════════
async function startApp() {
  document.getElementById("authCard").innerHTML = `
    <div class="spinner"></div>
    <h2>Connecting to SharePoint&hellip;</h2>
    <p>Loading site and list information.</p>
  `;
  try {
    await resolveSiteAndLists();
    await loadColumns();
    await Promise.all([loadItems(), loadGuide()]);
    document.getElementById("authScreen").style.display = "none";
    document.getElementById("app").style.display = "block";
    renderUserPill();
    renderTabs();
    renderContent();
  } catch (err) {
    console.error(err);
    document.getElementById("authCard").innerHTML = `
      <div class="logo-icon" style="font-size:24px">&#9888;&#65039;</div>
      <h2>Connection failed</h2>
      <p>Please check the Azure AD app permissions, site name, and list names.</p>
      <div class="error-box">${escapeHtml(err.message)}</div>
      <button class="btn btn-primary" style="margin-top:16px" onclick="startApp()">Retry</button>
    `;
  }
}

async function resolveSiteAndLists() {
  const site = await graphFetch(`/sites/${CONFIG.hostname}:${CONFIG.sitePath}`);
  siteId = site.id;
  const lists = await graphFetch(`/sites/${siteId}/lists?$top=300`);
  const match = (lists.value || []).find(l => l.displayName === CONFIG.listDisplayName);
  if (!match) {
    const names = (lists.value || []).map(l => l.displayName).join(", ");
    throw new Error(`Could not find the "${CONFIG.listDisplayName}" list. Lists found on this site: ${names}`);
  }
  listId = match.id;
  const guideMatch = (lists.value || []).find(l => l.displayName === CONFIG.guideListDisplayName);
  guideListId = guideMatch ? guideMatch.id : null; // optional — falls back to default text if missing
}

async function loadColumns() {
  const data = await graphFetch(`/sites/${siteId}/lists/${listId}/columns?$top=300`);
  const raw = (data.value || []).filter(c =>
    !c.hidden && !c.readOnly &&
    !["ContentType", "Attachments", "_ComplianceFlags", "_ComplianceTag", "_ComplianceTagWrittenTime", "_ComplianceTagUserId"].includes(c.name)
  );
  const orderIndex = name => {
    const i = CONFIG.preferredColumnOrder.findIndex(p => p.toLowerCase() === name.toLowerCase());
    return i === -1 ? 999 : i;
  };
  raw.sort((a, b) => orderIndex(a.displayName) - orderIndex(b.displayName));
  columns = raw;

  groupField = null;
  for (const cand of CONFIG.groupFieldCandidates) {
    const found = columns.find(c => c.name === cand || c.displayName === cand);
    if (found) { groupField = found.name; break; }
  }

  // Use the real Choice values from SharePoint (avoids mismatches with hardcoded strings)
  const groupCol = columns.find(c => c.name === groupField);
  teamChoices = (groupCol && groupCol.choice && groupCol.choice.choices && groupCol.choice.choices.length)
    ? groupCol.choice.choices
    : CONFIG.teamOrder;
}

function displayColumns() {
  // Columns shown in the table / add-entry form (excludes the Team/group column, which is handled by tabs)
  return columns.filter(c => c.name !== groupField);
}

function isHyperlinkCol(col) {
  return !!col.hyperlinkOrPicture || CONFIG.hyperlinkColumnNames.includes(col.displayName) || CONFIG.hyperlinkColumnNames.includes(col.name);
}

async function loadItems() {
  setSyncing(true);
  let items = [];
  let url = `/sites/${siteId}/lists/${listId}/items?$expand=fields&$top=200`;
  while (url) {
    const data = await graphFetch(url);
    items = items.concat(data.value || []);
    url = data["@odata.nextLink"] || null;
  }
  allItems = items.map(it => ({
    itemId: it.id,
    values: columns.reduce((acc, col) => { acc[col.name] = getFieldValue(it.fields, col); return acc; }, {})
  }));
  setSyncing(false, true);
}

async function loadGuide() {
  if (!guideListId) { guideContent = DEFAULT_GUIDE; guideItemId = null; return; }
  try {
    const data = await graphFetch(`/sites/${siteId}/lists/${guideListId}/items?$expand=fields&$top=5`);
    const items = data.value || [];
    if (items.length > 0) {
      guideItemId = items[0].id;
      guideContent = items[0].fields["GuideContent"] ?? items[0].fields["Guide_x0020_Content"] ?? DEFAULT_GUIDE;
    } else {
      guideItemId = null;
      guideContent = DEFAULT_GUIDE;
    }
  } catch (e) {
    guideItemId = null;
    guideContent = DEFAULT_GUIDE;
  }
}

async function reloadData() {
  try {
    await Promise.all([loadItems(), loadGuide()]);
    renderTabs();
    renderContent();
    toast("Refreshed with latest data ✓", "success");
  } catch (err) {
    setSyncing(false, false);
    toast("Refresh failed: " + err.message, "error");
  }
}

function setSyncing(isSyncing, ok) {
  const dot = document.getElementById("syncDot");
  if (!dot) return;
  dot.className = "sync-dot" + (isSyncing ? " syncing" : (ok === false ? " error" : ""));
}

function renderUserPill() {
  const name = currentAccount?.name || currentAccount?.username || "User";
  document.getElementById("userName").textContent = name;
  document.getElementById("userAvatar").textContent = name.slice(0,1).toUpperCase();
}

// ═══════════════════════════════════════════════════════════════════════════
// FIELD TYPE HANDLING
// ═══════════════════════════════════════════════════════════════════════════
function getFieldValue(fields, col) {
  const raw = fields ? fields[col.name] : undefined;
  if (raw === undefined || raw === null || raw === "") return null;
  if (isHyperlinkCol(col)) {
    if (typeof raw === "object") return raw.Url || raw.Description || null;
    return raw;
  }
  if (col.dateTime) {
    try { return new Date(raw).toISOString().slice(0, 10); } catch (e) { return String(raw); }
  }
  if (col.personOrGroup || col.lookup) {
    if (typeof raw === "object") return raw.LookupValue || raw.Title || raw.DisplayName || JSON.stringify(raw);
    return String(raw);
  }
  if (typeof raw === "object") return JSON.stringify(raw);
  return raw;
}

function buildWriteFields(values) {
  const fields = {};
  columns.forEach(col => {
    if (!(col.name in values)) return;
    const v = values[col.name];
    if (v === null || v === undefined || v === "") { fields[col.name] = null; return; }
    if (isHyperlinkCol(col)) {
      const url = /^https?:\/\//i.test(v) ? v : `https://${v}`;
      const looksValid = /^https?:\/\/[a-zA-Z0-9\-._~%]+\.[a-zA-Z]{2,}([/:?#].*)?$/.test(url);
      fields[col.name] = looksValid ? { Url: url, Description: v } : null;
    } else if (col.dateTime) {
      try { fields[col.name] = new Date(v).toISOString(); } catch (e) { fields[col.name] = v; }
    } else {
      fields[col.name] = v;
    }
  });
  return fields;
}

// ═══════════════════════════════════════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════════════════════════════════════
function getTabList() {
  return ["Welcome", ...teamChoices];
}

function tabLabel(key) { return key === "Welcome" ? "Guideline" : key; }

function itemsForTab(tabKey) {
  if (!groupField || tabKey === "Welcome") return [];
  return allItems.filter(it => it.values[groupField] === tabKey);
}

function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  const tabs = getTabList();
  tabsEl.innerHTML = tabs.map(t => {
    const count = t === "Welcome" ? "" : `<span class="tab-count">${itemsForTab(t).length}</span>`;
    return `<div class="tab ${t === activeTab ? "active" : ""}" onclick="switchTab('${jsAttrEscape(t)}')">${escapeHtml(tabLabel(t))}${count}</div>`;
  }).join("");
  const isWelcome = activeTab === "Welcome";
  document.getElementById("addEntryBtn").style.display = isWelcome ? "none" : "";
  document.getElementById("exportBtn").style.display = isWelcome ? "none" : "";
}

function switchTab(key) {
  activeTab = key;
  searchQ = ""; filterStatus = ""; filterCategory = "";
  sortCol = -1; sortAsc = true;
  editingItemId = null; guideEditing = false;
  renderTabs();
  renderContent();
}

// ═══════════════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════════════
function findCol(pred) { return columns.find(pred); }
function statusCol() { return findCol(c => c.displayName === "Status" || /status/i.test(c.name)); }
function categoryCol() { return findCol(c => c.displayName === "Category"); }
function descCol() { return findCol(c => c.displayName === "Description"); }

function getStatusClass(s) {
  if (!s) return "";
  const l = String(s).toLowerCase();
  if (l.includes("active")) return "active";
  if (l.includes("pending")) return "pending";
  if (l.includes("archive")) return "archived";
  return "";
}
function hashChipClass(str) {
  if (!str) return "chip-0";
  let h = 0;
  for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
  return "chip-" + (h % 5);
}

function renderContent() {
  const main = document.getElementById("mainContent");
  main.innerHTML = activeTab === "Welcome" ? renderWelcome() : renderTable();
  attachEvents();
}

// ── Guideline page ───────────────────────────────────────────────────────
function sanitizeGuideHtml(html) {
  // Basic sanitization: strip script/style tags and inline event handlers.
  const div = document.createElement("div");
  div.innerHTML = html || "";
  div.querySelectorAll("script, style, iframe, object, embed").forEach(el => el.remove());
  div.querySelectorAll("*").forEach(el => {
    [...el.attributes].forEach(attr => {
      if (/^on/i.test(attr.name) || attr.name === "srcdoc") el.removeAttribute(attr.name);
    });
  });
  return div.innerHTML;
}

function renderWelcome() {
  const totalAll = allItems.length;
  const sCol = statusCol();
  const counts = { active: 0, pending: 0, archived: 0 };
  if (sCol) {
    allItems.forEach(it => {
      const s = (it.values[sCol.name] || "").toLowerCase();
      if (s.includes("active") && !s.includes("pending")) counts.active++;
      else if (s.includes("pending")) counts.pending++;
      else if (s.includes("archive")) counts.archived++;
    });
  }
  const perTeamRows = teamChoices.map(t => `
    <div class="overview-row">
      <span class="overview-team">${escapeHtml(t)}</span>
      <span class="overview-count">${itemsForTab(t).length}</span>
    </div>`).join("");

  if (guideEditing) {
    return `
    <div class="welcome-card">
      <div class="welcome-card-header">
        <h2>Guideline</h2>
      </div>
      <div class="rte-toolbar">
        <button type="button" class="rte-btn" onclick="rteExec('bold')" title="Bold"><b>B</b></button>
        <button type="button" class="rte-btn" onclick="rteExec('underline')" title="Underline"><u>U</u></button>
        <button type="button" class="rte-btn" onclick="rteExec('strikeThrough')" title="Strikethrough"><s>S</s></button>
        <span class="rte-sep"></span>
        <select class="rte-select" onchange="rteExec('fontSize', this.value); this.selectedIndex=0;">
          <option value="">Size</option>
          <option value="2">Small</option>
          <option value="3">Normal</option>
          <option value="5">Large</option>
          <option value="7">Huge</option>
        </select>
        <span class="rte-sep"></span>
        <button type="button" class="rte-btn" onclick="rteExec('insertUnorderedList')" title="Bullet list">&#8226; List</button>
      </div>
      <div class="welcome-edit-area" id="guideEditArea" contenteditable="true">${sanitizeGuideHtml(guideContent)}</div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="cancelGuideEdit()">Cancel</button>
        <button class="btn btn-primary" onclick="saveGuide()">Save Guide</button>
      </div>
    </div>`;
  }
  return `
  <div class="welcome-card">
    <div class="welcome-card-header">
      <h2>Guideline</h2>
      <button class="btn btn-secondary btn-sm" onclick="startGuideEdit()">&#9998; Edit Guide</button>
    </div>
    <div class="welcome-body">${sanitizeGuideHtml(guideContent)}</div>
    <div class="quick-links">
      ${teamChoices.map(t => `<button class="btn btn-secondary btn-sm" onclick="switchTab('${jsAttrEscape(t)}')">${escapeHtml(t)}</button>`).join("")}
    </div>
  </div>

  <div class="welcome-card" style="margin-top:20px">
    <div class="welcome-card-header"><h2>Overall Document Status</h2></div>
    <div class="stats" style="margin-top:16px">
      <div class="stat-card"><div class="stat-dot blue"></div><div><div class="stat-num">${totalAll}</div><div class="stat-label">Total</div></div></div>
      ${sCol ? `
      <div class="stat-card"><div class="stat-dot green"></div><div><div class="stat-num">${counts.active}</div><div class="stat-label">Active</div></div></div>
      <div class="stat-card"><div class="stat-dot yellow"></div><div><div class="stat-num">${counts.pending}</div><div class="stat-label">Pending</div></div></div>
      <div class="stat-card"><div class="stat-dot red"></div><div><div class="stat-num">${counts.archived}</div><div class="stat-label">Archived</div></div></div>
      ` : ""}
    </div>
    <div class="overview-list">${perTeamRows}</div>
  </div>`;
}

function startGuideEdit() { guideEditing = true; renderContent(); }
function cancelGuideEdit() { guideEditing = false; renderContent(); }

function rteExec(command, value) {
  const area = document.getElementById("guideEditArea");
  if (area) area.focus();
  document.execCommand(command, false, value || null);
}

async function saveGuide() {
  const area = document.getElementById("guideEditArea");
  const html = sanitizeGuideHtml(area.innerHTML);
  if (!guideListId) {
    toast("The \"Document Repository Guide\" list was not found in SharePoint, so this can't be saved. See SETUP_LISTS.md.", "error");
    return;
  }
  setSyncing(true);
  try {
    if (guideItemId) {
      await graphFetch(`/sites/${siteId}/lists/${guideListId}/items/${guideItemId}/fields`, {
        method: "PATCH",
        body: JSON.stringify({ GuideContent: html })
      });
    } else {
      const created = await graphFetch(`/sites/${siteId}/lists/${guideListId}/items`, {
        method: "POST",
        body: JSON.stringify({ fields: { Title: "Welcome", GuideContent: html } })
      });
      guideItemId = created.id;
    }
    guideContent = html;
    guideEditing = false;
    renderContent();
    setSyncing(false, true);
    toast("Guide saved to SharePoint ✓", "success");
  } catch (err) {
    setSyncing(false, false);
    toast("Save failed: " + err.message, "error");
  }
}

// ── Document table ───────────────────────────────────────────────────────
function renderTable() {
  const cols = displayColumns();
  let items = itemsForTab(activeTab);
  const sCol = statusCol(), cCol = categoryCol();

  if (searchQ) {
    const q = searchQ.toLowerCase();
    items = items.filter(it => cols.some(c => it.values[c.name] && String(it.values[c.name]).toLowerCase().includes(q)));
  }
  if (filterStatus && sCol) {
    items = items.filter(it => it.values[sCol.name] && String(it.values[sCol.name]).toLowerCase().includes(filterStatus.toLowerCase()));
  }
  if (filterCategory && cCol) {
    items = items.filter(it => it.values[cCol.name] === filterCategory);
  }
  if (sortCol >= 0 && cols[sortCol]) {
    const key = cols[sortCol].name;
    items = [...items].sort((a, b) => {
      const av = a.values[key] || "", bv = b.values[key] || "";
      return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
  }

  const allInTab = itemsForTab(activeTab);
  const counts = { active: 0, pending: 0, archived: 0 };
  if (sCol) {
    allInTab.forEach(it => {
      const s = (it.values[sCol.name] || "").toLowerCase();
      if (s.includes("active") && !s.includes("pending")) counts.active++;
      else if (s.includes("pending")) counts.pending++;
      else if (s.includes("archive")) counts.archived++;
    });
  }
  const cats = cCol ? [...new Set(allInTab.map(it => it.values[cCol.name]).filter(Boolean))] : [];

  let html = `
  <div class="toolbar">
    <div class="search-box">
      <span class="search-icon">&#128269;</span>
      <input type="text" placeholder="Search documents, owner, description…" value="${escapeAttr(searchQ)}" oninput="onSearch(this.value)">
    </div>
    <div class="filter-group">
      ${sCol ? `<select class="filter-select" onchange="onFilterStatus(this.value)">
        <option value="">All Status</option>
        <option value="Active" ${filterStatus === "Active" ? "selected" : ""}>Active</option>
        <option value="Pending" ${filterStatus === "Pending" ? "selected" : ""}>Pending</option>
        <option value="Archived" ${filterStatus === "Archived" ? "selected" : ""}>Archived</option>
      </select>` : ""}
      ${cats.length > 1 ? `<select class="filter-select" onchange="onFilterCat(this.value)">
        <option value="">All Categories</option>
        ${cats.map(c => `<option value="${escapeAttr(c)}" ${filterCategory === c ? "selected" : ""}>${escapeHtml(c)}</option>`).join("")}
      </select>` : ""}
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-dot blue"></div><div><div class="stat-num">${allInTab.length}</div><div class="stat-label">Total</div></div></div>
    ${sCol ? `
    <div class="stat-card"><div class="stat-dot green"></div><div><div class="stat-num">${counts.active}</div><div class="stat-label">Active</div></div></div>
    <div class="stat-card"><div class="stat-dot yellow"></div><div><div class="stat-num">${counts.pending}</div><div class="stat-label">Pending</div></div></div>
    <div class="stat-card"><div class="stat-dot red"></div><div><div class="stat-num">${counts.archived}</div><div class="stat-label">Archived</div></div></div>
    ` : ""}
  </div>

  <div class="table-container">
    <table>
      <thead><tr>
        ${cols.map((c, i) => `<th class="sortable ${sortCol === i ? "sorted" : ""}" onclick="onSort(${i})">${escapeHtml(c.displayName || c.name)}<span class="sort-icon">${sortCol === i ? (sortAsc ? "↑" : "↓") : "↕"}</span></th>`).join("")}
        <th style="width:100px">Actions</th>
      </tr></thead>
      <tbody>`;

  if (items.length === 0) {
    html += `<tr><td colspan="${cols.length + 1}"><div class="empty"><div class="empty-icon">&#128269;</div><p>No items match your filters.</p></div></td></tr>`;
  } else {
    items.forEach(it => {
      const isEditing = editingItemId === it.itemId;
      html += `<tr class="${isEditing ? "editing" : ""}" data-item-id="${it.itemId}">`;
      cols.forEach(col => {
        const v = it.values[col.name];
        if (isEditing) {
          html += `<td><textarea class="cell-edit" data-col="${col.name}" rows="1">${escapeHtml(v || "")}</textarea></td>`;
        } else if (sCol && col.name === sCol.name) {
          const sc = getStatusClass(v);
          html += `<td><span class="badge ${sc}"><span class="badge-dot"></span>${escapeHtml(v || "—")}</span></td>`;
        } else if (cCol && col.name === cCol.name) {
          html += `<td>${v ? `<span class="chip ${hashChipClass(v)}">${escapeHtml(v)}</span>` : "—"}</td>`;
        } else if (isHyperlinkCol(col)) {
          const isReal = v && String(v).startsWith("http");
          html += `<td class="link-cell">${isReal ? `<a href="${escapeAttr(v)}" target="_blank">&#128279; Open</a>` : `<span class="link-placeholder">${escapeHtml(v || "No link")}</span>`}</td>`;
        } else if (col.name === "Title") {
          html += `<td class="doc-name">${escapeHtml(v || "—")}</td>`;
        } else if (descCol() && col.name === descCol().name) {
          const s = v ? String(v) : "";
          html += `<td class="desc" title="${escapeAttr(s)}">${escapeHtml(s.length > 80 ? s.slice(0, 80) + "…" : (s || "—"))}</td>`;
        } else {
          html += `<td>${escapeHtml(v || "—")}</td>`;
        }
      });
      if (isEditing) {
        html += `<td><div class="row-actions always-show">
          <button class="btn btn-primary btn-sm" onclick="saveRow('${it.itemId}')">✓</button>
          <button class="btn btn-secondary btn-sm" onclick="cancelEdit()">✕</button>
        </div></td>`;
      } else {
        html += `<td><div class="row-actions">
          <button class="btn btn-secondary btn-sm" onclick="editRow('${it.itemId}')" title="Edit">&#9999;&#65039;</button>
          <button class="btn btn-danger btn-sm" onclick="deleteRow('${it.itemId}')" title="Delete">&#128465;</button>
        </div></td>`;
      }
      html += `</tr>`;
    });
  }

  html += `</tbody></table>
    <button class="add-row-btn" onclick="openAddModal()">
      <span class="add-icon">&#65291;</span> Add new entry
    </button>
  </div>`;

  return html;
}

function attachEvents() {
  document.querySelectorAll(".cell-edit").forEach(ta => {
    ta.style.height = "auto";
    ta.style.height = ta.scrollHeight + "px";
    ta.addEventListener("input", () => { ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px"; });
  });
}

// ═══════════════════════════════════════════════════════════════════════════
// FILTERS / SORT
// ═══════════════════════════════════════════════════════════════════════════
function onSearch(v) { searchQ = v; renderContent(); }
function onFilterStatus(v) { filterStatus = v; renderContent(); }
function onFilterCat(v) { filterCategory = v; renderContent(); }
function onSort(ci) {
  if (sortCol === ci) sortAsc = !sortAsc; else { sortCol = ci; sortAsc = true; }
  renderContent();
}

// ═══════════════════════════════════════════════════════════════════════════
// CRUD
// ═══════════════════════════════════════════════════════════════════════════
function editRow(itemId) {
  editingItemId = itemId;
  renderContent();
  setTimeout(() => { const first = document.querySelector(".cell-edit"); if (first) first.focus(); }, 50);
}

async function saveRow(itemId) {
  const cells = document.querySelectorAll(`[data-item-id="${itemId}"] .cell-edit`);
  const values = {};
  cells.forEach(el => { values[el.dataset.col] = el.value.trim() || null; });

  setSyncing(true);
  const item = allItems.find(it => it.itemId === itemId);
  const failedFields = [];
  for (const col of columns) {
    if (!(col.name in values)) continue;
    try {
      const oneFieldPayload = buildWriteFields({ [col.name]: values[col.name] });
      await graphFetch(`/sites/${siteId}/lists/${listId}/items/${itemId}/fields`, { method: "PATCH", body: JSON.stringify(oneFieldPayload) });
      if (item) item.values[col.name] = values[col.name];
    } catch (fieldErr) {
      console.error(`Failed to save field "${col.displayName || col.name}":`, fieldErr);
      failedFields.push(col.displayName || col.name);
    }
  }
  editingItemId = null;
  renderTabs();
  renderContent();
  if (failedFields.length === 0) {
    setSyncing(false, true);
    toast("Saved to SharePoint ✓", "success");
  } else {
    setSyncing(false, false);
    toast(`Saved, but these fields couldn't be updated: ${failedFields.join(", ")}. Please check their column settings in SharePoint.`, "error");
  }
}

function cancelEdit() { editingItemId = null; renderContent(); }

async function deleteRow(itemId) {
  if (!confirm("Delete this item? It will also be removed from SharePoint.")) return;
  setSyncing(true);
  try {
    await graphFetch(`/sites/${siteId}/lists/${listId}/items/${itemId}`, { method: "DELETE" });
    allItems = allItems.filter(it => it.itemId !== itemId);
    renderTabs();
    renderContent();
    setSyncing(false, true);
    toast("Deleted", "success");
  } catch (err) {
    setSyncing(false, false);
    toast("Delete failed: " + err.message, "error");
  }
}

function openAddModal() {
  if (activeTab === "Welcome") return;
  const cols = displayColumns();
  document.getElementById("modalTitle").textContent = `Add Entry — ${activeTab}`;
  let form = "";
  for (let i = 0; i < cols.length; i += 2) {
    const isLast = i + 1 >= cols.length;
    form += `<div class="${isLast ? "" : "form-row"}">`;
    form += formField(cols[i]);
    if (!isLast) form += formField(cols[i + 1]);
    form += `</div>`;
  }
  document.getElementById("modalForm").innerHTML = form;
  document.getElementById("addModal").classList.add("open");
}

function formField(col) {
  const label = col.displayName || col.name;
  const isDesc = col.displayName === "Description";
  const isRequired = col.name === "Title" || col.required;
  const requiredMark = isRequired ? ' <span style="color:var(--red)">*</span>' : '';
  if (col.choice && col.choice.choices) {
    return `<div class="form-group"><label>${escapeHtml(label)}${requiredMark}</label>
      <select class="form-input" data-fi="${col.name}">
        ${col.choice.choices.map(c => `<option>${escapeHtml(c)}</option>`).join("")}
      </select></div>`;
  }
  if (col.dateTime) {
    return `<div class="form-group"><label>${escapeHtml(label)}${requiredMark}</label>
      <input class="form-input" data-fi="${col.name}" type="date"></div>`;
  }
  if (isHyperlinkCol(col)) {
    return `<div class="form-group"><label>${escapeHtml(label)}${requiredMark}</label>
      <input class="form-input" data-fi="${col.name}" type="text" placeholder="https://..."></div>`;
  }
  return `<div class="form-group"><label>${escapeHtml(label)}${requiredMark}</label>
    ${isDesc
      ? `<textarea class="form-input" data-fi="${col.name}" rows="2" placeholder="Enter ${escapeHtml(label)}…"></textarea>`
      : `<input class="form-input" data-fi="${col.name}" type="text" placeholder="Enter ${escapeHtml(label)}…">`
    }</div>`;
}

async function saveModal() {
  const fieldsEls = document.querySelectorAll("#modalForm [data-fi]");
  const values = {};
  fieldsEls.forEach(el => { values[el.dataset.fi] = el.value.trim() || null; });
  if (groupField) values[groupField] = activeTab; // auto-assign team from active tab

  if (!values["Title"]) {
    toast("Document Name is required.", "error");
    const titleInput = document.querySelector('#modalForm [data-fi="Title"]');
    if (titleInput) titleInput.focus();
    return;
  }

  setSyncing(true);
  try {
    // Step 1: create the item with only the required fields (Title + Team).
    // This isolates failures — if this succeeds, we know the base item is fine
    // and can pinpoint exactly which optional field is misconfigured in SharePoint.
    const baseValues = { Title: values["Title"] };
    if (groupField) baseValues[groupField] = values[groupField];
    const baseFields = buildWriteFields(baseValues);
    const created = await graphFetch(`/sites/${siteId}/lists/${listId}/items`, { method: "POST", body: JSON.stringify({ fields: baseFields }) });
    const itemId = created.id;

    // Step 2: patch every other field individually so one bad column doesn't block the rest.
    const savedValues = { ...baseValues };
    const failedFields = [];
    for (const col of columns) {
      if (col.name === "Title" || col.name === groupField) continue;
      if (!(col.name in values) || values[col.name] === null) continue;
      try {
        const oneFieldValues = { [col.name]: values[col.name] };
        const oneFieldPayload = buildWriteFields(oneFieldValues);
        await graphFetch(`/sites/${siteId}/lists/${listId}/items/${itemId}/fields`, { method: "PATCH", body: JSON.stringify(oneFieldPayload) });
        savedValues[col.name] = values[col.name];
      } catch (fieldErr) {
        console.error(`Failed to save field "${col.displayName || col.name}":`, fieldErr);
        failedFields.push(col.displayName || col.name);
      }
    }

    allItems.push({
      itemId,
      values: columns.reduce((acc, col) => { acc[col.name] = savedValues[col.name] ?? null; return acc; }, {})
    });
    closeModal();
    renderTabs();
    renderContent();
    setSyncing(false, true);
    if (failedFields.length === 0) {
      toast("Added to SharePoint ✓", "success");
    } else {
      toast(`Entry added, but these fields couldn't be saved: ${failedFields.join(", ")}. Please check their column settings in SharePoint.`, "error");
    }
  } catch (err) {
    setSyncing(false, false);
    toast("Add failed: " + err.message, "error");
  }
}

function closeModal() { document.getElementById("addModal").classList.remove("open"); }
document.getElementById("addModal").addEventListener("click", function (e) { if (e.target === this) closeModal(); });

function exportCSV() {
  if (activeTab === "Welcome") return;
  const cols = displayColumns();
  const items = itemsForTab(activeTab);
  const lines = [cols.map(c => c.displayName || c.name).join(",")];
  items.forEach(it => {
    lines.push(cols.map(c => `"${String(it.values[c.name] || "").replace(/"/g, '""')}"`).join(","));
  });
  const blob = new Blob([lines.join("\n")], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${activeTab.replace(/[^a-z0-9]/gi, "_")}_export.csv`;
  a.click();
  toast("CSV exported ✓", "success");
}

function toast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove("show"), 3000);
}

// ═══════════════════════════════════════════════════════════════════════════
// UTIL
// ═══════════════════════════════════════════════════════════════════════════
function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}
function escapeAttr(s) { return escapeHtml(s); }
// Safely embed a string as a single-quoted JS string literal inside a double-quoted HTML attribute
// (handles names containing apostrophes, e.g. "John's Cluster")
function jsAttrEscape(s) {
  return String(s)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, "&quot;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

initAuth();
