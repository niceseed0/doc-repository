<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3350;
    --accent:#4f7cff;--accent2:#7b5cfa;--green:#22c55e;--yellow:#f59e0b;
    --red:#ef4444;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--hr:#1e2240;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

  .auth-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;align-items:center;justify-content:center}
  .auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;text-align:center;max-width:400px;width:90%}
  .auth-card img{height:50px;margin-bottom:24px}
  .auth-card h2{font-size:20px;font-weight:700;margin-bottom:8px}
  .auth-card p{font-size:13px;color:var(--text3);margin-bottom:24px;line-height:1.6}
  .auth-status{font-size:12px;color:var(--text3);margin-top:12px;min-height:18px}
  .btn-ms{background:#0078d4;color:#fff;display:flex;align-items:center;gap:10px;padding:12px 24px;font-size:14px;border-radius:6px;margin:0 auto;cursor:pointer;border:none;font-family:'Inter',sans-serif}
  .btn-ms:hover{background:#106ebe}
  .btn-ms svg{width:20px;height:20px;flex-shrink:0}

  .header{background:linear-gradient(135deg,#0f1117 0%,#1a1d27 100%);border-bottom:1px solid var(--border);padding:16px 32px;position:sticky;top:0;z-index:100}
  .header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px}
  .logo img{height:44px;width:auto;object-fit:contain}
  .header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .sync-indicator{font-size:11px;padding:4px 10px;border-radius:6px;background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
  .sync-indicator.syncing{background:rgba(245,158,11,.1);color:#fbbf24;border-color:rgba(245,158,11,.2)}
  .sync-indicator.error{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.2)}
  .user-info{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 12px}
  .user-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
  .user-name{font-size:12px;color:var(--text2)}

  .btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
  .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#6b92ff}
  .btn-secondary{background:var(--surface2);color:var(--text2);border:1px solid var(--border)}.btn-secondary:hover{color:var(--text);border-color:var(--accent)}
  .btn-danger{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}.btn-danger:hover{background:rgba(239,68,68,.25)}
  .btn-sm{padding:5px 10px;font-size:12px}

  .tabs-wrapper{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;overflow-x:auto}
  .tabs{max-width:1400px;margin:0 auto;display:flex}
  .tab{padding:14px 18px;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
  .tab:hover{color:var(--text2)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
  .tab-count{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:4px;background:var(--surface2);font-size:10px;font-weight:600;margin-left:6px;color:var(--text3);padding:0 3px}
  .tab.active .tab-count{background:rgba(79,124,255,.2);color:var(--accent)}

  .main{max-width:1400px;margin:0 auto;padding:24px 32px}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .search-box{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;flex:1;min-width:200px}
  .search-box input{background:none;border:none;outline:none;color:var(--text);font-size:13px;width:100%;font-family:'Inter',sans-serif}
  .search-box input::placeholder{color:var(--text3)}
  .filter-select{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 10px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;outline:none}
  .filter-select:hover{border-color:var(--accent)}

  .stats{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:10px}
  .stat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .stat-dot.green{background:var(--green)}.stat-dot.yellow{background:var(--yellow)}.stat-dot.red{background:var(--red)}.stat-dot.blue{background:var(--accent)}
  .stat-num{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace}
  .stat-label{font-size:11px;color:var(--text3);margin-top:1px}

  .table-container{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead{background:var(--surface2)}
  th{padding:12px 14px;text-align:left;font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
  th:hover{color:var(--text2)}.sorted{color:var(--accent)}
  tbody tr{border-bottom:1px solid var(--hr);transition:background .1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(79,124,255,.04)}
  tbody tr.editing{background:rgba(79,124,255,.08)!important}
  td{padding:11px 14px;font-size:13px;color:var(--text2);vertical-align:middle}
  td.doc-name{color:var(--text);font-weight:500}
  td.desc{color:var(--text3);font-size:12px;max-width:240px}
  .cell-edit{background:var(--surface2);border:1px solid var(--accent);border-radius:5px;padding:5px 8px;font-size:13px;color:var(--text);width:100%;font-family:'Inter',sans-serif;outline:none;resize:none;min-width:80px}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
  .badge-dot{width:5px;height:5px;border-radius:50%}
  .badge.active{background:rgba(34,197,94,.15);color:#4ade80}.badge.active .badge-dot{background:var(--green)}
  .badge.pending{background:rgba(245,158,11,.15);color:#fbbf24}.badge.pending .badge-dot{background:var(--yellow)}
  .badge.archived{background:rgba(100,116,139,.15);color:#94a3b8}.badge.archived .badge-dot{background:var(--text3)}

  .chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;border:1px solid}
  .chip-blue{background:rgba(79,124,255,.12);color:#93b4ff;border-color:rgba(79,124,255,.3)}
  .chip-purple{background:rgba(123,92,250,.12);color:#b197fc;border-color:rgba(123,92,250,.3)}
  .chip-teal{background:rgba(20,184,166,.12);color:#5eead4;border-color:rgba(20,184,166,.3)}
  .chip-orange{background:rgba(251,146,60,.12);color:#fb923c;border-color:rgba(251,146,60,.3)}
  .chip-gray{background:rgba(100,116,139,.12);color:#94a3b8;border-color:rgba(100,116,139,.3)}
  .team-badge{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;background:rgba(79,124,255,.15);color:#93b4ff;border:1px solid rgba(79,124,255,.25);white-space:nowrap}
  .link-cell a{color:var(--accent);font-size:12px;text-decoration:none}.link-cell a:hover{text-decoration:underline}
  .link-placeholder{color:var(--text3);font-size:12px;font-style:italic}

  .row-actions{display:flex;gap:6px;opacity:0;transition:opacity .15s;white-space:nowrap}
  tbody tr:hover .row-actions,.row-actions.always-show{opacity:1}
  .add-row-btn{display:flex;align-items:center;gap:8px;padding:14px 18px;color:var(--text3);font-size:13px;cursor:pointer;transition:all .15s;border-top:1px solid var(--border);background:none;width:100%;text-align:left}
  .add-row-btn:hover{color:var(--accent);background:rgba(79,124,255,.05)}

  .modal-bg{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);align-items:center;justify-content:center}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:min(540px,90vw);max-height:90vh;overflow-y:auto}
  .modal h3{font-size:16px;font-weight:600;margin-bottom:20px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:12px;color:var(--text3);margin-bottom:6px}
  .form-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;outline:none}
  .form-input:focus{border-color:var(--accent)}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

  .welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px;max-width:820px}
  .welcome-card h2{font-size:22px;font-weight:700;margin-bottom:8px}
  .welcome-card .subtitle{color:var(--text3);font-size:14px;margin-bottom:24px;line-height:1.6}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:20px}
  .info-item{background:var(--surface2);border-radius:8px;padding:14px 16px}
  .info-item .label{font-size:11px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
  .info-item .value{font-size:13px;color:var(--text);font-weight:500}

  .loading{text-align:center;padding:60px;color:var(--text3)}
  .loading-spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;padding:48px;color:var(--text3)}
  .empty-icon{font-size:32px;margin-bottom:12px}

  .toast{position:fixed;bottom:24px;right:24px;z-index:300;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text2);transform:translateY(60px);opacity:0;transition:all .3s;pointer-events:none;max-width:320px}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.success{border-color:rgba(34,197,94,.4);color:#4ade80}
  .toast.error{border-color:rgba(239,68,68,.4);color:#f87171}

  @media(max-width:768px){
    .header{padding:12px 16px}.main{padding:16px}.tabs-wrapper{padding:0 16px}
    .form-row{grid-template-columns:1fr}.info-grid{grid-template-columns:1fr}
    .user-name{display:none}
  }
</style>
</head>

let msalInstance = null;
let currentUser = null;
let siteId = null;
let listId = null;

// ─── MSAL INIT ───────────────────────────────────────────────────────────────
async function initMsal() {
  const msalConfig = {
    auth: {
      clientId: CLIENT_ID,
      authority: `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: REDIRECT_URI,
    },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
  };
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();

  // Handle redirect response
  const response = await msalInstance.handleRedirectPromise();
  if (response) {
    await onSignedIn(response);
    return;
  }

  // Check existing session
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: accounts[0] });
      await onSignedIn(result);
    } catch(e) {
      showLoginScreen();
    }
  } else {
    showLoginScreen();
  }
}

function showLoginScreen() {
  document.getElementById('authOverlay').style.display = 'flex';
  setSyncStatus('error', '● 로그인 필요');
}

async function signIn() {
  document.getElementById('authStatus').textContent = '로그인 중...';
  try {
    await msalInstance.loginRedirect({ scopes: SCOPES });
  } catch(e) {
    document.getElementById('authStatus').textContent = '로그인 실패: ' + e.message;
  }
}

async function onSignedIn(result) {
  currentUser = result.account;
  document.getElementById('authOverlay').style.display = 'none';
  const name = currentUser.name || currentUser.username;
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('userInfo').style.display = 'flex';
  document.getElementById('signOutBtn').style.display = 'block';
  setSyncStatus('syncing', '● SharePoint 연결 중...');
  await initSharePoint();
  renderTabs();
  renderContent();
}

async function getToken() {
  const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account: currentUser });
  return result.accessToken;
}

function signOut() {
  msalInstance.logoutRedirect();
}

// ─── SHAREPOINT ───────────────────────────────────────────────────────────────
async function graphFetch(url, options={}) {
  const token = await getToken();
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, {
    ...options,
    headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', ...(options.headers||{}) }
  });
  if (!res.ok) {
    const err = await res.json().catch(()=>({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  return res.status === 204 ? null : res.json();
}

async function initSharePoint() {
  try {
    const site = await graphFetch(`/sites/${SHAREPOINT_HOST}:${SITE_PATH}`);
    siteId = site.id;
    const lists = await graphFetch(`/sites/${siteId}/lists?$select=id,name`);
    const found = lists.value.find(l => l.name === LIST_NAME);
    if (found) {
      listId = found.id;
      await loadFromSharePoint();
      useSharePoint = true;
      setSyncStatus('synced', '● SharePoint 연결됨');
    } else {
      setSyncStatus('error', '⚠ 리스트를 찾을 수 없음');
      useSharePoint = false;
    }
  } catch(e) {
    console.error('SP init error:', e);
    setSyncStatus('error', '⚠ 오프라인 모드');
    useSharePoint = false;
    toast('SharePoint 연결 실패 — 로컬 모드', 'error');
  }
}

async function loadFromSharePoint() {
  const res = await graphFetch(`/sites/${siteId}/lists/${listId}/items?expand=fields&$top=999`);
  spItems = res.value;

  // Rebuild data from SharePoint items
  TAB_KEYS.forEach(key => {
    if (data[key].welcome) return;
    data[key].rows = [];
    data[key]._spIds = [];
  });

  spItems.forEach(item => {
    const f = item.fields;
    const dept = f.Department || '';
    // Map dept to tab key
    const key = TAB_KEYS.find(k => TAB_DISPLAY[k] === dept) || null;
    if (!key || data[key]?.welcome) return;

    const headers = data[key].headers;
    const row = headers.map(h => {
      const hu = (h||'').toUpperCase().replace(/-/g,'').replace(/ /g,'');
      if (hu === 'TEAM') return f.TEAM || f.Team || null;
      if (hu === 'FOLDER') return f.Folder || null;
      if (hu === 'CATEGORY') return f.Category || null;
      if (hu === 'SUBCATEGORY') return f['Sub_x002d_Category'] || f.SubCategory || null;
      if (hu === 'DOCUMENT') return f.DOCUMENT || f.Document || null;
      if (hu === 'DESCRIPTION') return f.DESCRIPTION || f.Description || null;
      if (hu === 'OWNER') return f.OWNER || f.Owner || null;
      if (hu === 'LINK') return f.LINK || f.Link || null;
      if (hu === 'UPDATECYCLE') return f['Update_x0020_Cycle'] || f.UpdateCycle || null;
      if (hu === 'UPDATESTATUS') return f['Update_x0020_Status'] || f.UpdateStatus || null;
      if (hu.includes('DATE')) return f['Last_x0020_Updated_x0020_Date'] || f.LastUpdatedDate || null;
      return null;
    });
    data[key].rows.push(row);
    data[key]._spIds = data[key]._spIds || [];
    data[key]._spIds.push(item.id);
  });
}

async function saveToSharePoint(key, rowIdx) {
  if (!useSharePoint) return;
  setSyncStatus('syncing', '● 저장 중...');
  try {
    const row = data[key].rows[rowIdx];
    const headers = data[key].headers;
    const fields = { Department: TAB_DISPLAY[key] };
    headers.forEach((h, i) => {
      const hu = (h||'').toUpperCase().replace(/-/g,'').replace(/ /g,'');
      const val = String(row[i]||'');
      if (hu === 'TEAM') fields.TEAM = val;
      else if (hu === 'FOLDER') fields.Folder = val;
      else if (hu === 'CATEGORY') fields.Category = val;
      else if (hu === 'SUBCATEGORY') fields['Sub_x002d_Category'] = val;
      else if (hu === 'DOCUMENT') fields.DOCUMENT = val;
      else if (hu === 'DESCRIPTION') fields.DESCRIPTION = val;
      else if (hu === 'OWNER') fields.OWNER = val;
      else if (hu === 'LINK') fields.LINK = val;
      else if (hu === 'UPDATECYCLE') fields['Update_x0020_Cycle'] = val;
      else if (hu === 'UPDATESTATUS') fields['Update_x0020_Status'] = val;
      else if (hu.includes('DATE')) fields['Last_x0020_Updated_x0020_Date'] = val;
    });
    fields.Title = row[headers.findIndex(h=>h==='DOCUMENT')] || String(rowIdx);

    const spId = data[key]._spIds?.[rowIdx];
    if (spId) {
      await graphFetch(`/sites/${siteId}/lists/${listId}/items/${spId}/fields`, {
        method: 'PATCH', body: JSON.stringify(fields)
      });
    } else {
      const res = await graphFetch(`/sites/${siteId}/lists/${listId}/items`, {
        method: 'POST', body: JSON.stringify({ fields })
      });
      if (!data[key]._spIds) data[key]._spIds = [];
      data[key]._spIds[rowIdx] = res.id;
    }
    setSyncStatus('synced', '● SharePoint 저장됨');
  } catch(e) {
    setSyncStatus('error', '⚠ 저장 실패');
    toast('저장 실패: ' + e.message, 'error');
  }
}

async function deleteFromSharePoint(key, rowIdx) {
  if (!useSharePoint) return;
  const spId = data[key]._spIds?.[rowIdx];
  if (!spId) return;
  await graphFetch(`/sites/${siteId}/lists/${listId}/items/${spId}`, { method: 'DELETE' }).catch(()=>{});
}

function getDisplay(key) { return TAB_DISPLAY[key] || key; }

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = TAB_KEYS.map(key => {
    const d = data[key];
    const count = d.welcome ? '' : `<span class="tab-count">${d.rows.length}</span>`;
    return `<div class="tab ${key===activeTab?'active':''}" data-key="${key}">${getDisplay(key)}${count}</div>`;
  }).join('');
  tabs.querySelectorAll('.tab').forEach(el => el.addEventListener('click', ()=>switchTab(el.dataset.key)));
}

function switchTab(key) {
  activeTab=key; searchQ=''; filterStatus=''; filterCategory=''; filterTeam='';
  sortCol=-1; sortAsc=true; editingRow=null;
  renderTabs(); renderContent();
}

    btn.textContent=getDisplay(key);
    btn.addEventListener('click',()=>switchTab(key));
    nav.appendChild(btn);
  });
}

function getStatusClass(s) {
  if(!s) return '';
  const l=s.toLowerCase();
  if(l.includes('active')&&!l.includes('pending')) return 'active';
  if(l.includes('pending')) return 'pending';
  if(l.includes('archiv')) return 'archived';
  return '';
}
function chipColor(cat) {
  const m={'TRACKERS':'chip-blue','REPORTS':'chip-purple','DOCUMENTATIONS':'chip-teal','ADMINISTRATIVE':'chip-orange'};
  return m[(cat||'').toUpperCase()]||'chip-gray';
}

function renderTable() {
  const d=data[activeTab];
  const headers=d.headers;
  let rows=d.rows.map((r,i)=>({r,i}));
  if(searchQ){const q=searchQ.toLowerCase();rows=rows.filter(({r})=>r.some(v=>v&&String(v).toLowerCase().includes(q)));}
  const siStatus=headers.findIndex(h=>h&&h.includes('STATUS'));
  if(filterStatus&&siStatus>=0) rows=rows.filter(({r})=>r[siStatus]&&r[siStatus].toLowerCase().includes(filterStatus.toLowerCase()));
  const siCat=headers.findIndex(h=>h==='CATEGORY');
  if(filterCategory&&siCat>=0) rows=rows.filter(({r})=>r[siCat]===filterCategory);
  const siTeam=headers.findIndex(h=>h==='TEAM');
  if(filterTeam&&siTeam>=0) rows=rows.filter(({r})=>r[siTeam]===filterTeam);
  if(sortCol>=0) rows.sort((a,b)=>sortAsc?String(a.r[sortCol]||'').localeCompare(String(b.r[sortCol]||'')):String(b.r[sortCol]||'').localeCompare(String(a.r[sortCol]||'')));

  const total=d.rows;
  const counts={active:0,pending:0,archived:0};
  total.forEach(r=>{const s=(r[siStatus]||'').toLowerCase();if(s.includes('active')&&!s.includes('pending'))counts.active++;else if(s.includes('pending'))counts.pending++;else if(s.includes('archiv'))counts.archived++;});
  const cats=[...new Set(d.rows.map(r=>r[siCat]).filter(Boolean))];
  const teams=siTeam>=0?[...new Set(d.rows.map(r=>r[siTeam]).filter(Boolean))]:[];

  let html=`<div class="toolbar">
    <div class="search-box"><span>🔍</span><input type="text" placeholder="Search…" value="${searchQ}" id="searchInput"></div>
    <select class="filter-select" id="statusFilter">
      <option value="">All Status</option>
      <option value="Active" ${filterStatus==='Active'?'selected':''}>Active</option>
      <option value="Pending" ${filterStatus==='Pending'?'selected':''}>Pending</option>
      <option value="Archived" ${filterStatus==='Archived'?'selected':''}>Archived</option>
    </select>
    ${cats.length>1?`<select class="filter-select" id="catFilter"><option value="">All Categories</option>${cats.map(c=>`<option value="${c}" ${filterCategory===c?'selected':''}>${c}</option>`).join('')}</select>`:''}
    ${teams.length>1?`<select class="filter-select" id="teamFilter"><option value="">All Teams</option>${teams.map(t=>`<option value="${t}" ${filterTeam===t?'selected':''}>${t}</option>`).join('')}</select>`:''}
  </div>
  <div class="stats">
    <div class="stat-card"><div class="stat-dot blue"></div><div><div class="stat-num">${total.length}</div><div class="stat-label">Total</div></div></div>
    <div class="stat-card"><div class="stat-dot green"></div><div><div class="stat-num">${counts.active}</div><div class="stat-label">Active</div></div></div>
    <div class="stat-card"><div class="stat-dot yellow"></div><div><div class="stat-num">${counts.pending}</div><div class="stat-label">Pending</div></div></div>
    <div class="stat-card"><div class="stat-dot red"></div><div><div class="stat-num">${counts.archived}</div><div class="stat-label">Archived</div></div></div>
  </div>
  <div class="table-container"><table>
    <thead><tr>
      ${headers.map((h,i)=>`<th class="${sortCol===i?'sorted':''}" data-col="${i}">${h||'—'} ${sortCol===i?(sortAsc?'↑':'↓'):'↕'}</th>`).join('')}
      <th style="width:90px">Actions</th>
    </tr></thead><tbody>`;

  if(rows.length===0) {
    html+=`<tr><td colspan="${headers.length+1}"><div class="empty"><div class="empty-icon">🔍</div><p>No entries found.</p></div></td></tr>`;
  } else {
    rows.forEach(({r,i})=>{
      const isEditing=editingRow&&editingRow.tab===activeTab&&editingRow.idx===i;
      html+=`<tr class="${isEditing?'editing':''}" data-idx="${i}">`;
      r.forEach((v,ci)=>{
        const h=headers[ci]||'';
        if(isEditing){html+=`<td><textarea class="cell-edit" data-ci="${ci}" rows="1">${v||''}</textarea></td>`;}
        else if(h.includes('STATUS')){const sc=getStatusClass(v);html+=`<td><span class="badge ${sc}"><span class="badge-dot"></span>${v||'—'}</span></td>`;}
        else if(h==='CATEGORY'){html+=`<td>${v?`<span class="chip ${chipColor(v)}">${v}</span>`:'—'}</td>`;}
        else if(h==='TEAM'){html+=`<td>${v?`<span class="team-badge">${v}</span>`:'—'}</td>`;}
        else if(h==='LINK'){const isReal=v&&v!=='[LINK]'&&v.startsWith('http');html+=`<td class="link-cell">${isReal?`<a href="${v}" target="_blank">🔗 Open</a>`:`<span class="link-placeholder">${v||'—'}</span>`}</td>`;}
        else if(h==='DOCUMENT'){html+=`<td class="doc-name">${v||'—'}</td>`;}
        else if(h==='DESCRIPTION'){const txt=v||'—';html+=`<td class="desc" title="${txt}">${txt.length>80?txt.slice(0,80)+'…':txt}</td>`;}
        else{html+=`<td>${v||'—'}</td>`;}
      });
      if(isEditing){html+=`<td><div class="row-actions always-show"><button class="btn btn-primary btn-sm save-row" data-idx="${i}">✓</button><button class="btn btn-secondary btn-sm cancel-edit">✕</button></div></td>`;}
      else{html+=`<td><div class="row-actions"><button class="btn btn-secondary btn-sm edit-row" data-idx="${i}">✏️</button><button class="btn btn-danger btn-sm del-row" data-idx="${i}">🗑</button></div></td>`;}
      html+=`</tr>`;
    });
  }
  html+=`</tbody></table><button class="add-row-btn" id="addRowBtn">＋ Add new entry</button></div>`;
  return html;
}

function attachTableEvents() {
  const si=document.getElementById('searchInput');if(si)si.addEventListener('input',e=>{searchQ=e.target.value;renderContent();});
  const sf=document.getElementById('statusFilter');if(sf)sf.addEventListener('change',e=>{filterStatus=e.target.value;renderContent();});
  const cf=document.getElementById('catFilter');if(cf)cf.addEventListener('change',e=>{filterCategory=e.target.value;renderContent();});
  const tf=document.getElementById('teamFilter');if(tf)tf.addEventListener('change',e=>{filterTeam=e.target.value;renderContent();});
  document.querySelectorAll('th[data-col]').forEach(th=>th.addEventListener('click',()=>{
    const ci=parseInt(th.dataset.col);
    if(sortCol===ci)sortAsc=!sortAsc;else{sortCol=ci;sortAsc=true;}
    renderContent();
  }));
  document.querySelectorAll('.edit-row').forEach(btn=>btn.addEventListener('click',()=>editRow(parseInt(btn.dataset.idx))));
  document.querySelectorAll('.del-row').forEach(btn=>btn.addEventListener('click',()=>deleteRow(parseInt(btn.dataset.idx))));
  document.querySelectorAll('.save-row').forEach(btn=>btn.addEventListener('click',()=>saveRow(parseInt(btn.dataset.idx))));
  document.querySelectorAll('.cancel-edit').forEach(btn=>btn.addEventListener('click',()=>{editingRow=null;renderContent();}));
  const arb=document.getElementById('addRowBtn');if(arb)arb.addEventListener('click',openAddModal);
  document.querySelectorAll('.cell-edit').forEach(ta=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';ta.addEventListener('input',()=>{ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';});});
}

function editRow(idx){editingRow={tab:activeTab,idx};renderContent();setTimeout(()=>{const f=document.querySelector('.cell-edit');if(f)f.focus();},50);}
async function saveRow(idx){
  document.querySelectorAll(`[data-idx="${idx}"] .cell-edit`).forEach(el=>{data[activeTab].rows[idx][parseInt(el.dataset.ci)]=el.value.trim()||null;});
  editingRow=null;renderTabs();renderContent();
  await saveToSharePoint(activeTab,idx);
  toast('저장됨 ✓','success');
}
async function deleteRow(idx){
  if(!confirm('이 항목을 삭제할까요?')) return;
  await deleteFromSharePoint(activeTab,idx);
  data[activeTab].rows.splice(idx,1);
  if(data[activeTab]._spIds)data[activeTab]._spIds.splice(idx,1);
  renderTabs();renderContent();toast('삭제됨');
}

function openAddModal(){
  if(data[activeTab].welcome){switchTab('HR & Admin');setTimeout(openAddModal,100);return;}
  document.getElementById('modalTitle').textContent='Add Entry — '+getDisplay(activeTab);
  const headers=data[activeTab].headers;
  let form='';
  for(let i=0;i<headers.length;i+=2){
    const isLast=i+1>=headers.length;
    form+=`<div class="${isLast?'':'form-row'}">`;
    form+=formField(headers[i],i);
    if(!isLast)form+=formField(headers[i+1],i+1);
    form+=`</div>`;
  }
  document.getElementById('modalForm').innerHTML=form;
  document.getElementById('addModal').classList.add('open');
}
function formField(label,idx){
  if(!label)return'';
  const isDesc=label==='DESCRIPTION';
  const isStatus=label.includes('STATUS');
  const isCycle=label.includes('CYCLE');
  if(isStatus)return`<div class="form-group"><label>${label}</label><select class="form-input" data-fi="${idx}"><option>Active</option><option>Pending Update</option><option>Archived</option></select></div>`;
  if(isCycle)return`<div class="form-group"><label>${label}</label><select class="form-input" data-fi="${idx}"><option>Annually</option><option>Monthly</option><option>Quarterly</option></select></div>`;
  return`<div class="form-group"><label>${label}</label>${isDesc?`<textarea class="form-input" data-fi="${idx}" rows="2"></textarea>`:`<input class="form-input" data-fi="${idx}" type="text" placeholder="${label}…">`}</div>`;
}
async function saveModal(){
  const headers=data[activeTab].headers;
  const row=headers.map(()=>null);
  document.querySelectorAll('#modalForm [data-fi]').forEach(el=>{row[parseInt(el.dataset.fi)]=el.value.trim()||null;});
  data[activeTab].rows.push(row);
  const newIdx=data[activeTab].rows.length-1;
  closeModal();renderTabs();renderContent();
  await saveToSharePoint(activeTab,newIdx);
  toast('추가됨 ✓','success');
}
function closeModal(){document.getElementById('addModal').classList.remove('open');}

function exportCSV(){
  const d=data[activeTab];
  if(d.welcome){toast('탭을 선택하세요');return;}
  const lines=[d.headers.join(','),...d.rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','))];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/csv'}));
  a.download=getDisplay(activeTab).replace(/[^a-z0-9]/gi,'_')+'_export.csv';
  a.click();toast('CSV 내보내기 완료','success');
}

function setSyncStatus(state,text){
  const el=document.getElementById('syncIndicator');
  el.textContent=text;
  el.className='sync-indicator'+(state==='syncing'?' syncing':state==='error'?' error':'');
}
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className=`toast ${type} show`;
  setTimeout(()=>el.classList.remove('show'),2800);
}

// ─── EVENT LISTENERS ─────────────────────────────────────────────────────────
document.getElementById('loginBtn').addEventListener('click', signIn);
document.getElementById('signOutBtn').addEventListener('click', signOut);
document.getElementById('exportBtn').addEventListener('click', exportCSV);
document.getElementById('addEntryBtn').addEventListener('click', openAddModal);
document.getElementById('cancelModalBtn').addEventListener('click', closeModal);
document.getElementById('saveModalBtn').addEventListener('click', saveModal);
document.getElementById('addModal').addEventListener('click', e=>{if(e.target===e.currentTarget)closeModal();});

// ─── INIT ────────────────────────────────────────────────────────────────────
(async()=>{
  try {
    await initMsal();
  } catch(e) {
    document.getElementById('authStatus').textContent = '초기화 오류: ' + e.message;
  }
})();
</script>
</body>
</html>
